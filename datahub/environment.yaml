# TODO: Update to include torch, etc.
name: datahub-dev  # development environment for datahub
channels:
  - nvidia
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10.8
  - openbabel=3.1.1
  - pytorch=2.2.0
  - rdkit=2024.3.5
  - pip
  - pip:
    - debugpy>=1.8.5,<2
    - cython>=3.0.0,<4
    - pytest>=8.2.0,<9
    - pandas>=1.4.2,<2
    - numpy>=1.25.0,<2
    - scipy>=1.13.1,<2
    - cytoolz>=0.12.3,<1
    - biopython>=1.83,<2
    - fire>=0.6.0,<1
    - ruff==0.6.2
    - pytest-dotenv>=0.5.2,<1
    - pytest-cov>=4.1.0,<5
    - assertpy>=1.1.0,<2
    - pre-commit==3.7.1
    - tqdm>=4.65.0,<5
    - py3Dmol>=2.2.1,<3
    - einops==0.7.0
    - pyarrow==17.0.0
    - fastparquet==2024.5.0
    - ipykernel>=6.29.4,<7
    - hydra-core>=1.3.0,<1.4
    - pymol-remote>=0.0.5  # has no conflicting dependencies
    - git+https://${GITLAB_USER}:${GITLAB_TOKEN}@git.ipd.uw.edu/ai/biotite.git@v1.0.0
    - git+https://${GITLAB_USER}:${GITLAB_TOKEN}@git.ipd.uw.edu/ai/cifutils.git@v1.0.2
    ## Not needed but possibly useful
    # jaxtyping
    # dotenv
    # wandb 
    # lightning

# NOTE: After navigating to the datahub directory, you can install the local package in editable mode with:
#   pip install -e .
