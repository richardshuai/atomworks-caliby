stages:
  - lint
  - test
  - post-merge
  - release

lint-job:
  stage: lint
  rules:
    - if: $CI_MERGE_REQUEST_TITLE !~ /^(Draft|WIP):/i
      when: always
      allow_failure: false
  script:
    - echo "Running lint. If this fails, make sure you call `make format` before committing."
    - srun -p cpu --cpus-per-task=1 --mem=12G bash ./.ci/run_lint.sh || exit 1

unit-test-job:
  coverage: '/TOTAL.*\s+(\d+%)$/'
  stage: test
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main" && $CI_MERGE_REQUEST_TITLE !~ /^(Draft|WIP):/i
      when: always
      allow_failure: false
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME != "main"
      when: manual
      allow_failure: true
  script:
    - echo "Running unit tests"
    - set -e  # Exit immediately if a command exits with a non-zero status (so that we fail if the run gets killed)
    - srun -p cpu --cpus-per-task=1 --mem=32G bash ./.ci/run_tests.sh || exit 1

post-merge-job:
  coverage: '/TOTAL.*\s+(\d+%)$/'
  stage: post-merge
  rules:
    - if: $CI_COMMIT_BRANCH == "main"  # Run on main branch after merge
      when: always
    - when: never
  script:
    - echo "Running post-merge tests"
    - set -e  # Exit immediately if a command exits with a non-zero status (so that we fail if the run gets killed)
    - srun -p cpu --cpus-per-task=1 --mem=32G bash ./.ci/run_tests.sh || exit 1

create_release:
  stage: release
  rules:
    - if: $CI_COMMIT_TAG                  # Run this job when a tag is pushed
      when: always
    - when: never
  script:
    - echo "Creating a release for $CI_COMMIT_TAG"
    # TODO: Create updated version of `cifutils_latest.sif` apptainer on digs
  release:
    name: 'Release $CI_COMMIT_TAG'
    tag_name: '$CI_COMMIT_TAG'
    description: 'Release notes for version $CI_COMMIT_TAG'
