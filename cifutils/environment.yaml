name: cifutils-dev  # development environment for cifutils
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10.8
  - openbabel=3.1.1
  - pip
  - pip:
    - cython>=3.0.0,<4
    - pytest>=8.2.0,<9
    - pandas>=1.4.2,<2
    - numpy>=1.25.0,<2
    - scipy>=1.13.1,<2
    - cytoolz>=0.12.3,<1
    - biopython>=1.83,<2
    - fire>=0.6.0,<1
    - ruff==0.6.2
    - pytest-dotenv>=0.5.2,<1
    - pytest-cov>=4.1.0,<5
    - assertpy>=1.1.0,<2
    - pre-commit==3.7.1
    - git+https://${GITLAB_USER}:${GITLAB_TOKEN}@git.ipd.uw.edu/ai/biotite.git@v1.0.0

# NOTE: After navigating to the cifutils directory, you can install the local package in editable mode with:
#   pip install -e .