[tool.black]
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | env
  | .env
  | venv
  | .venv
)/
'''
line-length = 120
target-version = ['py310']

[tool.isort]
skip = [
    ".env", 
    "env", 
    ".venv", 
    "venv", 
    "notebooks",
    "data"
]
ensure_newline_before_comments = true
force_grid_wrap = 0
include_trailing_comma = true
line_length = 120 # match our custom config above
multi_line_output = 3
float_to_top = true
use_parentheses = true
skip_glob = "**/*.pyx"

[tool.autoflake]
exclude = [
    ".env",
    "env",
    ".venv",
    "venv",
    "notebooks",
    "data"
]
