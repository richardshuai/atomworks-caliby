name: lint_and_test

on:
  push:
    branches:
      - main
      - production
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
      - dev
      - staging
      - production
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/**'
  pull_request_target:
    types: [ready_for_review]
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  
jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Extract ruff version from pyproject.toml
        run: |
          echo "RUFF_VERSION=$(grep -E 'ruff.*=' pyproject.toml | sed -E 's/.*\"ruff==([^\"]+)\".*/\1/')" >> $GITHUB_ENV
          echo "Extracted Ruff version: ${{ env.RUFF_VERSION }}"
      - name: Install ruff
        run: pip install ruff==${{ env.RUFF_VERSION }}
      - name: ruff format (check code formatting)
        run: ruff format --diff
      - name: ruff check (lint code base)
        run: ruff check src tests

  test_digs:
    name: pytest (jojo)
    runs-on: [self-hosted]
    timeout-minutes: 30
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          export N_CPU=6
          srun --chdir=$PWD -p cpu -c $N_CPU -t 00:30:00 --mem=32G bash ./.github/ci/run_tests.sh
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml