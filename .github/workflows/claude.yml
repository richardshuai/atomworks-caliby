name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Provide context about the codebase and enforce coding standards
          prompt: |
            You have been tagged to help with this issue/PR/comment.

            **CRITICAL**: MAKE MINIMAL CHANGES ONLY.
            - Change ONLY the lines necessary to solve the problem
            - DO NOT refactor unrelated code
            - DO NOT add extra features or "improvements" not requested
            - DO NOT over-engineer the solution
            - Keep it simple and focused on the specific request

            **IMPORTANT**: Always follow the guidelines in CLAUDE.md. Key principles:

            ## Coding Standards
            - **DRY**: Extract common logic, avoid duplication
            - **YAGNI**: No speculative features - only what's requested
            - **Functions over classes**: Use classes only for state/inheritance
            - **Error handling**: Trust Python's natural errors - DO NOT add defensive null checks
            - **Type hints**: Always include; use jaxtyping for tensors

            ## Testing Philosophy (CRITICAL)
            **Quality over quantity. Avoid test bloat.**
            - Prefer 1-2 well-written end-to-end tests over many unit tests
            - Good example: `tests/ml/transforms/test_rdkit_utils.py`
            - DO NOT write trivial tests (getters/setters/wrappers)
            - ONLY test: complex logic, transforms, edge cases, regressions

            ## Documentation
            - Google-style docstrings (concise, no redundancy)
            - Type hints in signature only (not in docstring)
            - Examples are ALWAYS optional - only add if truly valuable

            ## Workflow
            1. Check CLAUDE.md for detailed guidelines
            2. Search codebase for existing similar functions (use Grep/Read)
            3. Look in: `src/atomworks/io/utils/`, `src/atomworks/ml/transforms/`, `*.common.*` files
            4. Follow established patterns
            5. Implement ONLY the requested changes - no extra refactoring or improvements
            6. Run relevant tests and ensure they pass (see below)

            **Remember**: Surgical precision. Touch only what needs to be touched.

            ## Testing Requirements (CRITICAL)
            **ALWAYS run tests after making changes. Work is NOT complete until tests pass.**

            ```bash
            # Activate Python environment FIRST
            source .venv/bin/activate

            # Run relevant tests (focus on what you changed)
            PDB_MIRROR_PATH=tests/data/pdb pytest tests/path/to/relevant/tests.py -v

            # If making broader changes, run full suite
            make format  # Format code first
            PDB_MIRROR_PATH=tests/data/pdb pytest tests -m "not very_slow" -n auto
            ```

            **Do NOT consider your work complete if tests fail. Fix issues until tests pass.**

            Now complete the task requested in the comment/issue.

          # Give Claude access to all necessary tools
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          claude_args: '--allowed-tools "Read,Write,Edit,Grep,Glob,Bash,WebFetch,WebSearch"'

